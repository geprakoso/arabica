; OPcache Configuration for PHP-FPM
; Place this in docker/php/opcache.ini

[opcache]
; Enable OPcache
opcache.enable = 1
opcache.enable_cli = 0

; ============================================
; MEMORY SETTINGS
; ============================================
; Amount of memory for storing compiled code (in MB)
opcache.memory_consumption = 256

; Memory limit for interned strings (in MB)
opcache.interned_strings_buffer = 16

; Maximum number of files that can be cached
opcache.max_accelerated_files = 10000

; ============================================
; REVALIDATE SETTINGS
; ============================================
; Production: disable timestamp validation for performance
; Development: enable to see changes immediately without restart
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2

; ============================================
; OPTIMIZATION SETTINGS
; ============================================
opcache.optimization_level = 0x7FFEBFFF

; ============================================
; CONSISTENCY SETTINGS
; ============================================
opcache.file_update_protection = 2
opcache.consistency_checks = 0

; ============================================
; JIT COMPILATION (PHP 8+)
; ============================================
; opcache.jit = 1255
; opcache.jit_buffer_size = 64M